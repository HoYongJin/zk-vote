# Quality gates (PROJECT_PLAN Phase 17). All installs use `npm ci` against
# committed lockfiles (AR-H8); live AWS deploys live in separate
# workflow_dispatch-gated workflows (audit M11).
name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  contracts-and-zk:
    name: Foundry + ZK/helper tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive # forge-std (lib/forge-std) is a git submodule
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
      - uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1
      - run: npm ci
      - name: TypeScript typecheck (repo scripts + tests)
        run: npm run typecheck
      - name: Shell syntax gate
        run: find scripts zk -name '*.sh' -print0 | xargs -0 bash -n
      - name: Deploy install policy gate (AR-H8)
        run: |
          if grep -R -n -E 'npm[[:space:]]+install' .github/workflows; then
            echo "Deploy/build paths must use npm ci against committed lockfiles." >&2
            exit 1
          fi
      - name: Secret-hygiene gate (SECURITY_AUDIT INFRA-1)
        run: |
          if ! grep -qxF '.env' .gcloudignore; then
            echo ".gcloudignore must exclude .env — gcloud builds submit ignores .gitignore and would upload secrets to the source bucket." >&2
            exit 1
          fi
      - name: Solidity format + build + test (Foundry)
        run: |
          forge fmt --check
          forge build
          forge test
      - name: Circuit/contract schema gate (audit C1)
        run: bash scripts/verify/check-artifact-schema.sh
      # test/poseidonCompat.test.ts deliberately imports the frontend's EXACT
      # poseidon-lite to assert it is bit-identical to circomlibjs (invariant #7),
      # so the logic-test job needs the frontend deps installed too.
      - run: npm ci --prefix frontend
      - name: Pure-logic helper tests (vitest)
        run: npm test

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefix frontend
      - run: npm test --prefix frontend
      - run: npm run build --prefix frontend
        env:
          CI: "true"
          # Vite only inlines VITE_*-prefixed env (import.meta.env) at build time.
          VITE_API_BASE_URL: /api

  rust:
    name: Rust fmt + clippy + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust-backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: rust-backend
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  migrations:
    name: Migration verification (apply twice + gates)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: zkvote
          POSTGRES_USER: zkvote
          POSTGRES_PASSWORD: zkvote_dev_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U zkvote -d zkvote"
          --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      PGPASSWORD: zkvote_dev_password
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Apply every migration twice (idempotency gate)
        run: |
          for round in 1 2; do
            for migration in rust-backend/migrations/*.sql; do
              echo "== round $round: $migration"
              psql -h 127.0.0.1 -U zkvote -d zkvote -v ON_ERROR_STOP=1 -f "$migration"
            done
          done
      - name: Fresh schema has no legacy columns
        run: |
          count=$(psql -h 127.0.0.1 -U zkvote -d zkvote -t -A -c \
            "SELECT count(*) FROM information_schema.columns WHERE table_name='elections' AND column_name IN ('title','registration_start_at')")
          test "$count" = "0"
      - name: Runtime role privilege gate (AR-M3)
        run: |
          psql -h 127.0.0.1 -U zkvote -d zkvote -v ON_ERROR_STOP=1 \
            -v migrator_password=ci_migrator_password \
            -v app_password=ci_app_password \
            -v readonly_password=ci_readonly_password \
            -f rust-backend/db/roles.sql
          psql -h 127.0.0.1 -U zkvote -d zkvote -v ON_ERROR_STOP=1 <<'SQL'
          BEGIN;
          SET LOCAL ROLE zkvote_app;
          DO $$
          BEGIN
              BEGIN
                  CREATE TABLE ci_runtime_role_should_not_create (x int);
                  RAISE EXCEPTION 'runtime role executed DDL';
              EXCEPTION WHEN insufficient_privilege THEN
                  RAISE NOTICE 'runtime role cannot execute DDL';
              END;
              INSERT INTO admins (id) VALUES ('00000000-0000-0000-0000-00000000c101');
              RAISE NOTICE 'runtime role can perform granted DML';
          END $$;
          ROLLBACK;
          SQL

  dependency-audit:
    name: Dependency audits (AR-H8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      # Blocking at critical severity for runtime dependencies; the full
      # report (all severities, dev deps) is informational below.
      - run: npm audit --omit=dev --audit-level=critical
      - run: npm audit --omit=dev --audit-level=critical --prefix frontend
      - name: Full audit report (informational)
        run: |
          npm audit || true
          npm audit --prefix frontend || true
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: cargo audit
        working-directory: rust-backend
        run: |
          cargo install cargo-audit --locked
          cargo audit
