name: Deploy Frontend to S3 and CloudFront

# DEPRECATED (PROJECT_PLAN Phase 16/18): the frontend now authenticates via
# Firebase/GCIP and the hosting target moved to GCP (Firebase Hosting). This
# AWS S3/CloudFront CD is kept workflow_dispatch-only and will be removed once
# the Firebase Hosting CD lands in Phase 18. The build args below were repointed
# from REACT_APP_SUPABASE_* to REACT_APP_FIREBASE_* so a manual dispatch builds a
# functional (Firebase) login rather than a broken Supabase one.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: legacy-aws-production
    defaults:
      run:
        working-directory: ./frontend # 모든 명령을 frontend 폴더에서 실행

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build React App
        run: npm run build
        env:
          REACT_APP_API_BASE_URL: /api
          # Firebase web config is PUBLIC (not secret), but kept as Actions
          # secrets so the project id is not hard-coded per environment.
          REACT_APP_FIREBASE_API_KEY: ${{ secrets.REACT_APP_FIREBASE_API_KEY }}
          REACT_APP_FIREBASE_AUTH_DOMAIN: ${{ secrets.REACT_APP_FIREBASE_AUTH_DOMAIN }}
          REACT_APP_FIREBASE_PROJECT_ID: ${{ secrets.REACT_APP_FIREBASE_PROJECT_ID }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Deploy to S3
        run: |
          aws s3 sync ./build s3://${{ secrets.S3_BUCKET_NAME }} --delete
        
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
