name: Deploy Frontend to Firebase Hosting

# PROJECT_PLAN Phase 16/18: this REPLACES the legacy AWS S3/CloudFront CD
# (deploy-frontend.yml). It is workflow_dispatch-only until Phase 18 provisions
# the GCP/Firebase project + secrets — running it before then will fail at the
# auth/deploy step (the zkvote-staging Firebase project does not exist yet).
#
# Phase-18 prerequisites (cost-gated):
#   - GitHub secret FIREBASE_SERVICE_ACCOUNT = the deployer SA JSON (Firebase
#     Hosting Admin) — gitignored, never committed.
#   - GitHub secrets REACT_APP_FIREBASE_API_KEY / _AUTH_DOMAIN / _PROJECT_ID and
#     REACT_APP_API_BASE_URL (the staging Cloud Run URL + /api).
#   - pin google-github-actions/auth to a commit SHA (supply-chain, AR-H8).
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: gcp-staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # AR-H8: lockfile-pinned dependency install via `npm ci` only.
      - run: npm ci --prefix frontend
      - run: npm run build --prefix frontend
        env:
          CI: "true"
          REACT_APP_API_BASE_URL: ${{ secrets.REACT_APP_API_BASE_URL }}
          # Firebase web config is PUBLIC (not secret); kept as Actions secrets so
          # the project id is not hard-coded per environment.
          REACT_APP_FIREBASE_API_KEY: ${{ secrets.REACT_APP_FIREBASE_API_KEY }}
          REACT_APP_FIREBASE_AUTH_DOMAIN: ${{ secrets.REACT_APP_FIREBASE_AUTH_DOMAIN }}
          REACT_APP_FIREBASE_PROJECT_ID: ${{ secrets.REACT_APP_FIREBASE_PROJECT_ID }}
      - name: Authenticate to GCP (Firebase deployer service account)
        uses: google-github-actions/auth@v2 # TODO Phase 18: pin to a commit SHA
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      - name: Deploy to Firebase Hosting
        # npx fetches firebase-tools transiently (no global add) — AR-H8 stays green.
        run: npx --yes firebase-tools@13 deploy --only hosting --project zkvote-staging --non-interactive
