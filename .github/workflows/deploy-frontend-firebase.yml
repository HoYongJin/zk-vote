name: Deploy Frontend to Firebase Hosting

# PROJECT_PLAN Phase 16/18: the confirmed frontend CD (Firebase Hosting). It
# replaced the now-removed legacy AWS S3/CloudFront path. workflow_dispatch-only until Phase 18 provisions
# the GCP/Firebase project + secrets — running it before then will fail at the
# auth/deploy step (Firebase Hosting must be enabled on the staging Firebase project first).
#
# Phase-18 prerequisites (cost-gated):
#   - GCP Workload Identity Federation from scripts/iac/setup-github-wif.sh.
#   - GitHub environment secrets synced by scripts/cicd/sync-github-frontend-env.ts:
#     VITE_FIREBASE_API_KEY / _AUTH_DOMAIN / _PROJECT_ID and VITE_API_BASE_URL.
#   - pin google-github-actions/auth to a commit SHA (supply-chain, AR-H8).
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: gcp-staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # AR-H8: lockfile-pinned dependency install via `npm ci` only.
      - run: npm ci --prefix frontend
      - run: npm run build --prefix frontend
        env:
          CI: "true"
          # Vite only inlines VITE_*-prefixed env (import.meta.env) at build time;
          # REACT_APP_* are silently dropped, yielding an undefined-config bundle.
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          # Firebase web config is PUBLIC (not secret); kept as Actions secrets so
          # the project id is not hard-coded per environment.
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      - name: Authenticate to GCP (Firebase deployer service account)
        uses: google-github-actions/auth@v2 # TODO Phase 18: pin to a commit SHA
        with:
          workload_identity_provider: projects/1063460548473/locations/global/workloadIdentityPools/zkvote-github/providers/github
          service_account: zkvote-staging-firebase-admin@zkvote-staging-hhyyj.iam.gserviceaccount.com
      - name: Deploy to Firebase Hosting
        # npx fetches firebase-tools transiently (no global add) — AR-H8 stays green.
        run: npx --yes firebase-tools@13 deploy --only hosting --project zkvote-staging-hhyyj --non-interactive
