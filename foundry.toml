# Foundry config — replaces hardhat.config.js (Solidity toolchain migration).
# Keeps contracts in their existing contracts/ dir; emits artifacts to out/
# (the Rust deploy path reads out/<File>.sol/<Contract>.json — see
# crates/api/src/routes/manage.rs::read_contract_bytecode, dual Hardhat/Foundry shape).
[profile.default]
src = "contracts"
out = "out"
test = "test"               # forge discovers *.t.sol / *.sol test contracts; the .js files here are ignored
script = "script"
libs = ["lib"]
solc = "0.8.20"             # match hardhat.config.js
optimizer = false           # hardhat had no optimizer block -> disabled; keep audited-bytecode parity
evm_version = "paris"       # avoids PUSH0 and preserves bytecode compatibility with the audited pre-Foundry build
# forge test reads the shared real-proof fixture (rust-backend/crates/api/testdata/proof_fixture.json) via vm.readFile.
fs_permissions = [{ access = "read", path = "./" }]

[fmt]
line_length = 120
# The Groth16Verifier_*.sol files are snarkjs-generated and regenerated by the ZK
# build; never reformat them (a reformat is reverted on the next regen).
ignore = ["contracts/Groth16Verifier_*.sol"]
